# Optional: only when Pages → Build and deployment → Source = "GitHub Actions".
# If you use "Deploy from branch" → main → /docs, rely on npm run build:pages + committed docs/ instead.
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: website-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Verify static export
        run: |
          test -f out/index.html
          test -d out/_next
          test -f out/.nojekyll
          grep -q "_next" out/index.html

      - name: Export HTML integrity
        run: npm run verify:export

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out
          # v4 excludes dotfiles from the tarball by default; .nojekyll must ship or Jekyll can skip _next/.
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
