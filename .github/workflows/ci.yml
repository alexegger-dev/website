name: CI

on:
  push:
  pull_request:

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build (matches Pages env)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Verify static export
        run: |
          test -f out/index.html
          test -d out/_next
          test -f out/.nojekyll
          grep -q "_next" out/index.html

      - name: Export HTML integrity (out/ — sections, .nojekyll, display name)
        run: npm run verify:export

      - name: Sync docs (branch-based Pages)
        run: node ./scripts/sync-github-pages-docs.mjs

      - name: Verify docs/ (used when Pages = branch main /docs)
        run: |
          test -f docs/index.html
          test -d docs/_next
          test -f docs/.nojekyll

      - name: Docs HTML integrity (docs/ after sync)
        run: npm run verify:docs
